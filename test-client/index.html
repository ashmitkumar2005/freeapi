<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freeapi Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 20px;
        }

        .header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 24px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="text"],
        select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: var(--primary);
        }

        #message-input {
            flex: 1;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .settings-bar {
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.2);
            font-size: 0.8rem;
            display: flex;
            gap: 16px;
            color: var(--text-muted);
        }

        .settings-bar input {
            background: transparent;
            border: none;
            color: var(--primary);
            font-family: monospace;
            width: 200px;
        }

        .typing {
            font-style: italic;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 8px;
            display: none;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>Freeapi Chat</h1>
            <select id="model-select">
                <option value="gpt-4o-mini">GPT-4o Mini</option>
                <option value="claude-3-haiku-20240307">Claude 3 Haiku</option>
                <option value="meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo">Llama 3.1 70B</option>
            </select>
        </div>

        <div class="settings-bar">
            <span>Server: <b>http://localhost:3000</b></span>
            <span>API Key: <input type="password" id="api-key-input" placeholder="paste frapi_... key here"></span>
        </div>

        <div id="chat-window" class="chat-container">
            <div class="message assistant">
                Hello! I am connected to your Freeapi server. Paste your API key in the bar above and start chatting!
            </div>
        </div>

        <div class="input-area">
            <div id="typing-indicator" class="typing">AI is thinking...</div>
            <div class="controls">
                <input type="text" id="message-input" placeholder="Type your message..." autocomplete="off">
                <button id="send-btn">
                    <span>Send</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const apiKeyInput = document.getElementById('api-key-input');
        const modelSelect = document.getElementById('model-select');
        const typingIndicator = document.getElementById('typing-indicator');

        // Load saved key
        apiKeyInput.value = localStorage.getItem('freeapi_key') || 'frapi_c87c7259b1f2b6acb6cad95bcbdfabd6cd2569cd1074b830';

        apiKeyInput.addEventListener('change', () => {
            localStorage.setItem('freeapi_key', apiKeyInput.value);
        });

        const appendMessage = (role, text) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.innerHTML = `<pre>${text}</pre>`;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        };

        const sendMessage = async () => {
            const text = messageInput.value.trim();
            const apiKey = apiKeyInput.value.trim();
            if (!text || !apiKey) return;

            appendMessage('user', text);
            messageInput.value = '';

            sendBtn.disabled = true;
            typingIndicator.style.display = 'block';

            try {
                const response = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        messages: [{ role: 'user', content: text }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    appendMessage('assistant', `Error: ${data.error.message || data.error}`);
                } else {
                    const content = data.choices[0].message.content;
                    appendMessage('assistant', content);
                }
            } catch (err) {
                appendMessage('assistant', `Connection Error: ${err.message}. Make sure the server is running at http://localhost:3000`);
            } finally {
                sendBtn.disabled = false;
                typingIndicator.style.display = 'none';
            }
        };

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
